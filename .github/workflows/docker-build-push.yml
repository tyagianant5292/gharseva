name: Build & Push Docker Image

# Builds the GharSeva container and pushes it to Docker Hub.
# MANUAL ONLY: GharSeva deploys on Vercel, so the Docker image isn't needed for
# normal operation. To enable it, add repo secrets DOCKERHUB_USERNAME +
# DOCKERHUB_TOKEN, then run this workflow from the Actions tab (or re-add a
# `push:` trigger). Left as workflow_dispatch so pushes don't fail without secrets.

on:
  workflow_dispatch: {}

env:
  IMAGE: tyagianant98/gharseva
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
